<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Churrascaria Gutemberg - A melhor churrascaria de Firminópolis GO. Espetinhos, refeições e bebidas. Ambiente familiar com avaliação 4,8 estrelas.">
<meta name="theme-color" content="#c1272d">
<title>Churrascaria Gutemberg | Firminópolis GO</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --red: #c1272d;
  --red-dark: #8b1a1f;
  --orange: #f47920;
  --orange-light: #ff9a3c;
  --dark: #0f0a08;
  --light: #fdf6ed;
  --gold: #e8b339;
  --text: #2a2220;
  --muted: #7a6b68;
  --gradient: linear-gradient(135deg, #c1272d 0%, #f47920 100%);
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Poppins', sans-serif;
  color: var(--text);
  background: var(--light);
  line-height: 1.7;
  overflow-x: hidden;
}
h1, h2, h3, h4 { font-family: 'Playfair Display', serif; }
img { max-width: 100%; display: block; }

/* ============ HEADER ============ */
header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 1000;
  padding: 20px 5%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: all 0.4s ease;
  background: transparent;
}
header.scrolled {
  background: rgba(15, 10, 8, 0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 5%;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.logo {
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: 1.5rem;
  font-weight: 900;
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
  z-index: 1001;
}
.logo::before {
  content: '🔥';
  font-size: 1.4rem;
  animation: flame 2s infinite ease-in-out;
}
@keyframes flame {
  0%, 100% { transform: scale(1) rotate(-3deg); }
  50% { transform: scale(1.1) rotate(3deg); }
}
.logo span {
  background: var(--gradient);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
nav ul {
  display: flex;
  list-style: none;
  gap: 35px;
}
nav a {
  color: #fff;
  text-decoration: none;
  font-weight: 500;
  font-size: 0.95rem;
  position: relative;
  transition: color 0.3s;
  letter-spacing: 0.5px;
}
nav a::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 0;
  width: 0;
  height: 2px;
  background: var(--gradient);
  transition: width 0.3s ease;
}
nav a:hover::after { width: 100%; }
nav a:hover { color: var(--orange-light); }
.menu-toggle {
  display: none;
  background: none;
  border: none;
  color: #fff;
  font-size: 1.8rem;
  cursor: pointer;
  z-index: 1001;
}

/* ============ HERO ============ */
.hero {
  min-height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  color: #fff;
  padding: 120px 20px 60px;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(rgba(15,10,8,0.75), rgba(139,26,31,0.7)),
              url('https://images.unsplash.com/photo-1558030006-450675393462?w=1600&q=80') center/cover;
  z-index: 0;
}
.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 100%, rgba(244,121,32,0.35), transparent 60%);
  z-index: 1;
}
.hero-content {
  max-width: 900px;
  position: relative;
  z-index: 2;
  animation: fadeUp 1s ease-out;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
.badge {
  display: inline-block;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(232,179,57,0.5);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  padding: 8px 20px;
  border-radius: 50px;
  font-size: 0.8rem;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 25px;
  color: var(--gold);
  font-weight: 500;
}
.rating {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  border: 1px solid rgba(232,179,57,0.4);
  padding: 14px 28px;
  border-radius: 50px;
  margin-bottom: 30px;
  font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  animation: float 3s infinite ease-in-out;
  flex-wrap: wrap;
  justify-content: center;
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.stars {
  color: var(--gold);
  letter-spacing: 3px;
  font-size: 1.1rem;
  text-shadow: 0 0 20px rgba(232,179,57,0.6);
}
.rating-text { font-size: 0.85rem; opacity: 0.85; font-weight: 400; }
.hero h1 {
  font-size: clamp(2.2rem, 7vw, 5rem);
  font-weight: 900;
  margin-bottom: 20px;
  line-height: 1.1;
  letter-spacing: -1px;
  text-shadow: 2px 4px 20px rgba(0,0,0,0.5);
}
.hero h1 .highlight {
  background: linear-gradient(135deg, var(--orange-light), var(--gold));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  display: inline-block;
}
.hero p {
  font-size: clamp(1rem, 2vw, 1.25rem);
  margin-bottom: 40px;
  opacity: 0.95;
  font-weight: 300;
  max-width: 700px;
  margin-left: auto;
  margin-right: auto;
}
.hero-buttons {
  display: flex;
  gap: 15px;
  justify-content: center;
  flex-wrap: wrap;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 16px 34px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  font-size: 1rem;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  border: none;
  cursor: pointer;
  letter-spacing: 0.3px;
  position: relative;
  overflow: hidden;
  font-family: 'Poppins', sans-serif;
}
.btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.6s;
}
.btn:hover::before { left: 100%; }
.btn-primary {
  background: var(--gradient);
  color: #fff;
  box-shadow: 0 10px 30px rgba(193,39,45,0.5);
}
.btn-primary:hover {
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(193,39,45,0.7);
}
.btn-whats {
  background: #25D366;
  color: #fff;
  box-shadow: 0 10px 30px rgba(37,211,102,0.4);
}
.btn-whats:hover {
  background: #1ebe5a;
  transform: translateY(-3px);
  box-shadow: 0 15px 40px rgba(37,211,102,0.6);
}
.btn-outline {
  background: rgba(255,255,255,0.1);
  color: #fff;
  border: 2px solid rgba(255,255,255,0.3);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.btn-outline:hover {
  background: rgba(255,255,255,0.2);
  border-color: #fff;
  transform: translateY(-3px);
}
.scroll-indicator {
  position: absolute;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  color: #fff;
  opacity: 0.7;
  animation: bounce 2s infinite;
  font-size: 1.5rem;
  z-index: 2;
}
@keyframes bounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-10px); }
}

/* ============ SECTIONS ============ */
section { padding: 100px 5%; position: relative; }
.container { max-width: 1200px; margin: 0 auto; }
.section-tag {
  display: block;
  text-align: center;
  color: var(--orange);
  font-size: 0.85rem;
  font-weight: 600;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 15px;
}
.section-title {
  text-align: center;
  font-size: clamp(1.9rem, 5vw, 3rem);
  color: var(--dark);
  margin-bottom: 20px;
  font-weight: 900;
  line-height: 1.2;
}
.section-title .highlight {
  background: var(--gradient);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}
.section-title::after {
  content: '';
  display: block;
  width: 80px;
  height: 4px;
  background: var(--gradient);
  margin: 20px auto 0;
  border-radius: 2px;
}
.subtitle {
  text-align: center;
  color: var(--muted);
  margin-bottom: 60px;
  font-size: 1.05rem;
  max-width: 650px;
  margin
